# Guided Questions Templates for CodeQL/Semgrep Rules (LLM verification style)
#
# Questions MUST force the LLM to trace:
#   1. WHERE variables are declared
#   2. What their exact SIZES/VALUES are
#   3. Whether sizes/values CHANGE through assignment or reallocation
#   4. What CHECKS or CONSTRAINTS exist
#   5. What OTHER variables feed into the target variables
#
# The LLM must answer ALL questions BEFORE giving a verdict.
# This forces step-by-step reasoning instead of pattern matching.
#
# Language: Python
#
# Format:
#   rule_id:
#     short_description: Brief description of the vulnerability
#     questions: List of questions to answer BEFORE verdict
#     context_hint: What additional context helps (caller, struct, etc.)
#     additional_context: List of context types that may be needed

py/sql-injection:
  short_description: "User input concatenated into SQL query"
  questions:
    - "Where does the INPUT originate - request.args, request.form, request.json, or other?"
    - "Trace the INPUT through ALL assignments - is it ever SANITIZED?"
    - "Is the query built using f-strings, .format(), +, or % (all vulnerable)?"
    - "Or is cursor.execute() called with PLACEHOLDERS and a tuple (safe)?"
    - "Is an ORM method like .filter() or .get() used instead of raw SQL?"
    - "What is the DATABASE and does the driver support parameterization?"
  context_hint: "Trace from request input through all transformations to query execution."
  additional_context: ["caller"]

py/command-injection:
  short_description: "User input passed to shell command execution"
  questions:
    - "Where does the INPUT originate - request, file, environment variable?"
    - "Is subprocess called with shell=True (vulnerable) or shell=False (safer)?"
    - "If shell=True, is shlex.quote() used to ESCAPE the input?"
    - "If shell=False, is the input passed as a LIST of arguments (safe)?"
    - "Could an attacker inject SHELL METACHARACTERS?"
    - "Is os.system() used (always vulnerable) vs subprocess.run()?"
  context_hint: "Trace from input source to subprocess/os.system call."
  additional_context: ["caller"]

py/xss:
  short_description: "User input rendered in HTML response without escaping"
  questions:
    - "Where does the INPUT originate - request.args, request.form, database?"
    - "Is the input passed through an ESCAPE function (escape(), html.escape())?"
    - "Is a TEMPLATE ENGINE used with auto-escaping enabled?"
    - "Or is the response built with f-strings/concatenation (vulnerable)?"
    - "Is |safe or {% autoescape false %} used to DISABLE escaping?"
    - "What is the CONTENT-TYPE of the response (text/html triggers XSS)?"
  context_hint: "Trace from input source through template/response construction."
  additional_context: ["caller"]

py/unsafe-deserialization:
  short_description: "Deserializing untrusted data with pickle or yaml.load"
  questions:
    - "Where does the SERIALIZED DATA come from - request body, file, database?"
    - "Is pickle.loads() or yaml.load() used (vulnerable to code execution)?"
    - "Could an attacker CONTROL the serialized data content?"
    - "Would json.loads() or yaml.safe_load() work as a SAFE alternative?"
    - "Is there any VALIDATION of the data before deserialization?"
    - "What CLASS or TYPE is expected to be deserialized?"
  context_hint: "Trace from data source to deserialization call."
  additional_context: ["caller"]

py/path-injection:
  short_description: "User input used in file path allowing directory traversal"
  questions:
    - "Where does the PATH input originate - request parameter, form field?"
    - "Is os.path.join() used (note: it does NOT prevent traversal if input starts with /)?"
    - "Is the path NORMALIZED with os.path.realpath() or os.path.abspath()?"
    - "After normalization, is the result CHECKED to start with the allowed base directory?"
    - "Could '../' sequences or absolute paths escape the intended directory?"
    - "What FILE OPERATIONS are performed (read, write, delete)?"
  context_hint: "Trace from input through path construction to file operation."
  additional_context: ["caller"]

py/code-injection:
  short_description: "User input passed to eval/exec/compile"
  questions:
    - "Where does the INPUT come from - request, file, environment?"
    - "Is eval(), exec(), or compile() called with user-controlled data?"
    - "Is there ANY validation or sandboxing of the input?"
    - "Could ast.literal_eval() be used instead (safe for data literals)?"
    - "What CODE could an attacker execute - import os, __import__, etc.?"
    - "Is the eval in a restricted namespace or with full globals?"
  context_hint: "Trace from input source to eval/exec call."
  additional_context: ["caller"]

py/ssrf:
  short_description: "Server-side request forgery via user-controlled URL"
  questions:
    - "Where does the URL come from - request parameter, database, config?"
    - "Is the URL VALIDATED against an allowlist of domains/hosts?"
    - "Could an attacker specify an INTERNAL IP (127.0.0.1, 169.254.x.x, 10.x.x.x)?"
    - "Is the URL SCHEME validated (http/https only, not file://)?"
    - "What RESPONSE data is returned to the user or used server-side?"
    - "Could an attacker probe internal services or exfiltrate data?"
  context_hint: "Trace from URL input through request construction."
  additional_context: ["caller"]

# ==============================================================================
# JavaScript/TypeScript Security
# ==============================================================================

py/broken-authentication:
  short_description: "Insecure session token generation or missing session expiry"
  questions:
    - "How are session tokens generated - what entropy source is used (secrets.token_hex, os.urandom, or weak random)?"
    - "Are session tokens INVALIDATED after logout or timeout - is there a server-side expiry enforced?"
    - "Is the session token sent over HTTPS only (Secure flag) and inaccessible to JavaScript (HttpOnly flag)?"
    - "Is the session ID rotated after privilege escalation (e.g., after login to prevent session fixation)?"
    - "Are there concurrent session limits, or can an attacker reuse a stolen token indefinitely?"
    - "Does the authentication path validate credentials before creating a session, or can sessions be created without auth?"
  context_hint: "Include token generation, session creation, and session validation logic."
  additional_context: ["caller"]

py/hardcoded-credentials:
  short_description: "Hardcoded password, API key, or secret in source code"
  questions:
    - "Is this string a real credential used in production, or a placeholder/example/test value?"
    - "Is this value committed to version control where it could be exposed to others?"
    - "Could this credential be rotated if compromised, or is it baked into the application?"
    - "Is there an environment variable or secrets manager (Vault, AWS Secrets Manager) already in use that should be used instead?"
    - "What system or service does this credential grant access to, and what is the blast radius if leaked?"
    - "Is this code path reachable from production, or is it only used in tests/development?"
  context_hint: "Include the credential usage and any configuration loading."
  additional_context: []

py/sensitive-data-exposure:
  short_description: "Sensitive data logged, printed, or transmitted without protection"
  questions:
    - "What sensitive data is being exposed (password, token, PII, credit card, health data)?"
    - "Where does this data end up - log file, HTTP response, console, third-party service?"
    - "Who has access to that destination (all users, admins, log aggregation services)?"
    - "Is the data MASKED or REDACTED before being written (e.g., last 4 digits of card)?"
    - "Is there a legal or compliance obligation (GDPR, PCI-DSS, HIPAA) that prohibits this exposure?"
    - "Is this in an error handler that might expose internal details to the end user?"
  context_hint: "Include the data source and where it flows to."
  additional_context: ["caller"]

py/insecure-randomness:
  short_description: "Using random module instead of secrets for security-sensitive values"
  questions:
    - "What is this random value used for - token, session ID, OTP, CSRF value, salt?"
    - "Is random.random(), random.randint(), or random.choice() used (not cryptographically secure)?"
    - "Could an attacker predict the output by observing previous values (Mersenne Twister is predictable)?"
    - "Should secrets.token_hex(), secrets.token_urlsafe(), or os.urandom() be used instead?"
    - "What is the security impact if the random value is predictable?"
    - "Is this in a test or simulation context where cryptographic strength is not needed?"
  context_hint: "Include random generation and how the value is used."
  additional_context: ["caller"]

py/ecb-encryption:
  short_description: "Using ECB cipher mode which reveals plaintext patterns"
  questions:
    - "What cipher mode is being used - is it explicitly ECB or is it the default (often ECB)?"
    - "What type of data is being encrypted (structured data, images, text blocks)?"
    - "Would ECB mode reveal patterns in the ciphertext (identical plaintext blocks produce identical ciphertext)?"
    - "Should GCM (authenticated encryption) or CBC with HMAC be used instead?"
    - "Is the encryption for confidentiality, integrity, or both?"
    - "Is there an IV/nonce being used - ECB mode does not use an IV which is a strong signal of weakness?"
  context_hint: "Include cipher initialization and mode selection."
  additional_context: []

py/race-condition:
  short_description: "TOCTOU race on filesystem or shared state without proper locking"
  questions:
    - "Is os.path.exists() or os.access() checked before opening/using a file (TOCTOU gap)?"
    - "Could an attacker replace the file with a symlink between the check and the open?"
    - "Is threading.Lock() or a file lock (fcntl.flock) used to protect shared state?"
    - "Can the operation be made atomic - e.g., open with 'x' mode (exclusive creation) instead of checking?"
    - "In a multi-threaded or multi-process context, is the shared variable protected?"
    - "What is the security impact if the race is won by an attacker (arbitrary file write, privilege escalation)?"
  context_hint: "Include the check and use operations and any locking."
  additional_context: ["caller"]

# ==============================================================================
# Resource Leaks
# ==============================================================================

py/xxe:
  short_description: "XML parser configured to allow external entity resolution"
  questions:
    - "Which XML library is used (lxml, xml.etree, minidom, xmltodict, defusedxml)?"
    - "Is the XML input from an untrusted source (request body, uploaded file, network)?"
    - "Are external entities explicitly DISABLED (e.g., lxml with resolve_entities=False, no_network=True)?"
    - "Is defusedxml used as a safe drop-in replacement?"
    - "Could an attacker use an XXE payload to read local files (/etc/passwd) or perform SSRF?"
    - "Is DTD processing disabled, or could an attacker define a DOCTYPE with external entities?"
  context_hint: "Include XML parser initialization and all parsing options."
  additional_context: ["caller"]

py/information-exposure:
  short_description: "Stack trace, exception detail, or internal path returned to user"
  questions:
    - "What sensitive information could be exposed - stack trace, file paths, database schema, internal variable values?"
    - "Is this returned in an HTTP response, rendered in a template, or logged to an accessible location?"
    - "In production, is DEBUG mode disabled and generic error pages served instead of tracebacks?"
    - "Could an attacker trigger this deliberately to learn about the application internals?"
    - "Is the exception handler catching too broadly and re-exposing the original exception message?"
    - "Should only a generic error message be returned to the user, with full details logged internally?"
  context_hint: "Include the exception handler and where the error detail is sent."
  additional_context: ["caller"]

py/deprecated-api:
  short_description: "Weak hash function (MD5/SHA1) used for passwords or security-critical purpose"
  questions:
    - "What is hashlib.md5() or hashlib.sha1() used for - password storage, HMAC, content addressing, checksum?"
    - "If for PASSWORD HASHING: bcrypt, argon2, or scrypt must be used instead (MD5/SHA1 are not password hash functions)?"
    - "Is there a salt used, or is the hash computed directly from the input (rainbow table vulnerable)?"
    - "For non-password use: is collision resistance required (MD5/SHA1 are broken for collisions)?"
    - "Is this for backward compatibility with an external system that requires MD5/SHA1?"
    - "Is this code path reachable in production, or only used in tests/development?"
  context_hint: "Include hash computation and how the result is used."
  additional_context: []

# ==============================================================================
# Python - Injection (LDAP, XPath, Log, HTML, Template, Header)
# ==============================================================================

py/ldap-injection:
  short_description: "LDAP query or filter built from untrusted user input"
  questions:
    - "Where does the INPUT originate — request.args, request.form, request.json, or other user-controlled source?"
    - "Is the input concatenated directly into an LDAP filter string (e.g., f'(uid={user})')?"
    - "Is the input ESCAPED using ldap3's escape_filter_chars() or equivalent before use?"
    - "Could an attacker inject LDAP metacharacters (* ( ) \\ NUL) to alter the filter — e.g., authentication bypass via (uid=*)?"
    - "What LDAP operations are affected — ldap3.Connection.search, python-ldap.search?"
    - "Would using parameterized search filters or a strict allowlist of alphanumeric characters prevent this?"
  context_hint: "Trace from request input through LDAP filter construction to search call."
  additional_context: ["caller"]

py/xpath-injection:
  short_description: "XPath expression built from untrusted user input"
  questions:
    - "Where does the INPUT originate — request parameter, form field, or other user-controlled source?"
    - "Is the input concatenated into an XPath string (e.g., f\"//user[name='{user}']\")?"
    - "Is the input ESCAPED or validated to reject XPath metacharacters (', \", [, ], /)?"
    - "Could an attacker inject a payload like ' or '1'='1 to bypass authentication or extract all data?"
    - "What library is used (lxml, xml.etree) and does it support parameterized XPath with variables?"
    - "Would using lxml's XPath variable binding (e.g., xpath('//user[name=$n]', n=user)) prevent injection?"
  context_hint: "Trace from input through XPath string construction to evaluate call."
  additional_context: ["caller"]

py/log-injection:
  short_description: "Unsanitized user input written to logs enabling log forging"
  questions:
    - "Where does the LOG DATA originate — request parameters, user-supplied strings, external API responses?"
    - "Is the data written to a log via logging.info/warning/error without sanitization?"
    - "Could an attacker embed newline characters (\\n, \\r) to inject fake log entries?"
    - "Could injected entries mask real security events or mislead incident responders?"
    - "Is the log consumed by a log aggregation system (ELK, Splunk) that could be confused by crafted entries?"
    - "Would stripping or encoding newlines and control characters from user data before logging prevent this?"
  context_hint: "Include the log call and the source of the logged data."
  additional_context: ["caller"]

py/html-injection:
  short_description: "Untrusted HTML fragment inserted into response without sanitization"
  questions:
    - "Where does the HTML fragment originate — request parameter, database, or CMS field?"
    - "Is the fragment inserted into a response that is rendered as text/html?"
    - "Is the content SANITIZED with a library like bleach/nh3 to an allowlist of safe tags?"
    - "If sanitized, is the allowlist strict (no script, no event handlers, no javascript: URLs)?"
    - "Is this distinct from XSS — is the intent to allow some HTML but restrict dangerous tags?"
    - "Would using a strict Content Security Policy (CSP) limit the damage if sanitization is incomplete?"
  context_hint: "Include the HTML source, sanitization step, and how the result is rendered."
  additional_context: ["caller"]

py/template-injection:
  short_description: "User input embedded in a Jinja2/Mako/Chameleon template string"
  questions:
    - "Where does the INPUT originate — request parameter, database field, config file?"
    - "Is the input used as the TEMPLATE SOURCE (e.g., jinja2.Template(user_input)) rather than a template variable?"
    - "Could an attacker inject Jinja2 expressions like {{7*7}} or {{config}} to execute Python code?"
    - "Is the template rendered in a SANDBOX (jinja2.sandbox.SandboxedEnvironment) that restricts dangerous operations?"
    - "If sandboxed, is the sandbox escape-resistant (Jinja2 sandbox has known bypasses)?"
    - "Would treating user input as data (passed as template variable) rather than template code fix this?"
  context_hint: "Include template engine initialization and where user input enters the template."
  additional_context: ["caller"]

py/header-injection:
  short_description: "HTTP response header value built from user-controlled input"
  questions:
    - "Where does the HEADER VALUE originate — request parameter, cookie, form field?"
    - "Is the value set in a response header (e.g., response.headers['Location'] = user_input) without validation?"
    - "Could an attacker inject \\r\\n (CRLF) sequences to inject additional headers or split the response?"
    - "Is the header a Location redirect — if so, is the value validated against an allowlist of allowed hosts?"
    - "What is the security impact — cache poisoning, open redirect, XSS via injected Content-Type?"
    - "Would stripping \\r, \\n, and %0d, %0a from values before setting headers prevent this?"
  context_hint: "Include the header assignment and source of the header value."
  additional_context: ["caller"]

# ==============================================================================
# Python - Web Security (CSRF, Open Redirect, Cookie, ReDoS)
# ==============================================================================

py/csrf:
  short_description: "State-changing endpoint missing CSRF token validation"
  questions:
    - "Does this endpoint perform a state-changing operation (write, update, delete, transfer)?"
    - "Is a CSRF token required in the request and validated server-side (not just checked for presence)?"
    - "Is the framework's CSRF protection enabled globally (e.g., Flask-WTF, Django CsrfMiddleware)?"
    - "Is this endpoint exempt from CSRF protection — if so, is it truly safe (idempotent, read-only)?"
    - "Could the SameSite=Strict cookie attribute or a custom request header (X-Requested-With) mitigate this?"
    - "Could an attacker craft a cross-origin form or fetch request to trigger this action on behalf of a victim?"
  context_hint: "Include the route handler and any middleware or decorator for CSRF."
  additional_context: ["caller"]

py/open-redirect:
  short_description: "Redirect to a user-controlled URL without domain validation"
  questions:
    - "Where does the REDIRECT TARGET URL come from — request.args, request.form, query string?"
    - "Is the URL validated against an allowlist of trusted domains or paths before redirecting?"
    - "Could an attacker supply an absolute URL (https://evil.com) or protocol-relative URL (//evil.com) to redirect victims?"
    - "Is there a check that the redirect stays on the same host (e.g., validating urlparse(url).netloc)?"
    - "What is the phishing/social-engineering risk — users see a trusted domain before being redirected?"
    - "Would redirecting only to relative paths or validating against a fixed set of allowed URLs prevent this?"
  context_hint: "Include the redirect call and where the target URL comes from."
  additional_context: ["caller"]

py/insecure-cookie:
  short_description: "Session or security cookie missing Secure, HttpOnly, or SameSite attribute"
  questions:
    - "Which cookie is being set — session ID, CSRF token, auth token?"
    - "Is the Secure flag set (prevents transmission over HTTP, required for sensitive cookies)?"
    - "Is the HttpOnly flag set (prevents JavaScript access, mitigates XSS-based theft)?"
    - "Is the SameSite attribute set to Strict or Lax (mitigates CSRF)?"
    - "Is the cookie domain scoped as narrowly as possible (not .example.com when app.example.com suffices)?"
    - "Is the cookie lifetime appropriate — session cookies (no max_age) vs persistent tokens?"
  context_hint: "Include the cookie-setting call and all attributes passed."
  additional_context: []

py/weak-cryptographic-algorithm:
  short_description: "Weak or broken cryptographic algorithm (MD5, SHA1, DES, RC4) used for security"
  questions:
    - "Which algorithm is used (MD5, SHA1, SHA-256, DES, 3DES, RC4, Blowfish) and for what purpose?"
    - "Is this for password HASHING (must use bcrypt/argon2/scrypt), HMAC, symmetric encryption, or checksums?"
    - "Is collision resistance required — MD5 and SHA1 are broken for collision resistance?"
    - "Is preimage resistance required — MD5 is weakened; SHA1 is acceptable only for non-security checksums?"
    - "For symmetric encryption: is a modern authenticated cipher (AES-GCM, ChaCha20-Poly1305) available?"
    - "Is this for backward compatibility with an external system, and is there a migration path?"
  context_hint: "Include the crypto function call and how the result is used."
  additional_context: []

py/regex-dos:
  short_description: "Regular expression with catastrophic backtracking matched against user input"
  questions:
    - "What is the REGEX pattern — does it contain nested quantifiers like (a+)+, (a|a)*, or similar?"
    - "Is the pattern matched against USER-CONTROLLED input without length limits?"
    - "What is the WORST-CASE backtracking behavior — exponential, polynomial, or linear?"
    - "Is there a timeout (re.timeout, signal.alarm, or similar) on the regex operation?"
    - "Could an attacker craft an input like 'aaaaaaaaa...!' to trigger exponential backtracking and hang the server?"
    - "Would rewriting the pattern (possessive quantifiers, atomic groups) or using the 'regex' library with timeout fix this?"
  context_hint: "Include the regex pattern and where user input enters the match operation."
  additional_context: []

py/insecure-temporary-file:
  short_description: "Predictable temporary file path or insecure mktemp() usage"
  questions:
    - "Is tempfile.mktemp() used (returns a name without creating the file — TOCTOU race) instead of mkstemp()?"
    - "Is the temp file created in /tmp with a predictable name (e.g., based on PID or timestamp)?"
    - "Could an attacker pre-create a symlink at that path to redirect writes to a sensitive file?"
    - "Is tempfile.mkstemp() or tempfile.NamedTemporaryFile(delete=False) used for atomic creation?"
    - "Are the file permissions set to 0600 (owner-only) before any sensitive data is written?"
    - "Is the temp file securely deleted (shutil.rmtree or tempfile.TemporaryDirectory context manager) after use?"
  context_hint: "Include temp file creation and how the path is derived."
  additional_context: []

py/xml-bomb:
  short_description: "XML parser vulnerable to billion-laughs or quadratic entity expansion DoS"
  questions:
    - "Which XML parser is used (lxml, xml.etree, minidom, expat) and is entity expansion limited?"
    - "Is the XML input from an untrusted source (request body, uploaded file, external feed)?"
    - "Does the parser process DTD entity definitions that could cause exponential expansion?"
    - "Is defusedxml used, which disables entity expansion and DTD processing by default?"
    - "Is there a maximum document size or entity depth limit configured?"
    - "Would disabling DTD processing (e.g., lxml with resolve_entities=False, forbid_dtd=True) prevent this?"
  context_hint: "Include XML parser initialization and input source."
  additional_context: ["caller"]

