# Guided Questions Templates for CodeQL Rules (LLM verification style)
#
# Questions MUST force the LLM to trace:
#   1. WHERE variables are declared
#   2. What their exact SIZES/VALUES are
#   3. Whether sizes/values CHANGE through assignment or reallocation
#   4. What CHECKS or CONSTRAINTS exist
#   5. What OTHER variables feed into the target variables
#
# The LLM must answer ALL questions BEFORE giving a verdict.
# This forces step-by-step reasoning instead of pattern matching.
#
# Format:
#   rule_id:
#     short_description: Brief description of the vulnerability
#     questions: List of questions to answer BEFORE verdict
#     context_hint: What additional context helps (caller, struct, etc.)
#     additional_context: List of context types that may be needed

# ==============================================================================
# C/C++ Memory Safety - Buffer/Copy Operations
# ==============================================================================

cpp/overflow-buffer:
  short_description: "Copy function using source size instead of destination size"
  questions:
    - "Where is the DESTINATION buffer declared and what is its exact size (in bytes or elements)?"
    - "Where is the SOURCE buffer/data declared and what is its exact size?"
    - "Do these sizes ever CHANGE through assignment, reallocation, or function parameters?"
    - "If source or destination take values from OTHER variables, where are THOSE declared and what are their sizes?"
    - "Are there any CHECKS or CONSTRAINTS on source size, destination size, or the copy length BEFORE the copy?"
    - "What other OPERATIONS act on these buffers between declaration and the flagged copy?"
  context_hint: "Must include buffer declarations. May need caller function if sizes come from parameters."
  additional_context: ["caller", "struct"]

cpp/overflowing-snprintf:
  short_description: "snprintf size argument derived from its own return value"
  questions:
    - "Where is the DESTINATION buffer declared and what is its exact size?"
    - "What is the SIZE argument passed to snprintf and where does it come from?"
    - "Does the size argument depend on a PREVIOUS snprintf return value?"
    - "Is the destination buffer size FIXED at compile time or DYNAMIC?"
    - "Are there any BOUNDS checks on the size before snprintf is called?"
    - "Could repeated calls cause the size argument to exceed the buffer?"
  context_hint: "Include buffer declaration and all snprintf calls in sequence."
  additional_context: ["caller"]

cpp/invalid-pointer-deref:
  short_description: "Pointer dereference that may be out of bounds"
  questions:
    - "Where is the POINTER declared and what buffer does it point to?"
    - "What is the SIZE of the underlying buffer?"
    - "What OFFSET or arithmetic is applied to the pointer before dereference?"
    - "Where does the offset VALUE come from - is it user-controlled or bounded?"
    - "Are there any BOUNDS checks on the pointer or offset BEFORE dereference?"
    - "Could any code path cause the pointer to exceed the buffer bounds?"
  context_hint: "Include pointer declaration, buffer allocation, and offset calculations."
  additional_context: ["caller", "struct"]

# ==============================================================================
# C/C++ Memory Safety - Allocation/Deallocation
# ==============================================================================

cpp/use-after-free:
  short_description: "Use of pointer after memory has been freed"
  questions:
    - "Where is the pointer ALLOCATED (malloc, calloc, new) and what variable holds it?"
    - "Where is the pointer FREED (free, delete) - list ALL free() calls for this pointer?"
    - "Is the pointer set to NULL immediately after being freed?"
    - "List ALL code paths from the free() to the flagged use - can ANY path reach the use?"
    - "If the pointer is REASSIGNED between free and use, where and to what value?"
    - "Are there any ALIAS pointers that point to the same memory?"
  context_hint: "Must trace all paths between free and use. May need caller if pointer passed as parameter."
  additional_context: ["caller"]

cpp/double-free:
  short_description: "Memory freed more than once"
  questions:
    - "Where is the pointer ALLOCATED and what variable holds it?"
    - "List ALL free() calls for this pointer with their line numbers."
    - "For each pair of free() calls, is there a code path that reaches BOTH?"
    - "Is the pointer set to NULL after the FIRST free?"
    - "If set to NULL, is there a NULL check before the SECOND free?"
    - "Are there ALIAS pointers that could cause the same memory to be freed via different variables?"
  context_hint: "Include all control flow paths between free calls."
  additional_context: ["caller"]

cpp/stack-address-escape:
  short_description: "Address of stack variable escapes function scope"
  questions:
    - "Where is the LOCAL variable declared - is it truly on the stack (auto storage)?"
    - "Is the variable declared as 'static' (which would make it NOT stack-allocated)?"
    - "HOW does the address escape - return value, global pointer, heap storage, callback?"
    - "If stored in a struct/object, where is THAT struct allocated (stack or heap)?"
    - "What happens when the function returns - is the escaped address still used?"
    - "Could the variable actually be heap-allocated via alloca() or VLA?"
  context_hint: "Include variable declaration and all uses of its address."
  additional_context: ["caller", "struct"]

# ==============================================================================
# C/C++ Memory Safety - Other
# ==============================================================================

cpp/uninitialized-local:
  short_description: "Use of uninitialized local variable"
  questions:
    - "Where is the variable DECLARED and what is its type?"
    - "Is there an INITIALIZER at declaration (e.g., 'int x = 0;')?"
    - "List ALL code paths from declaration to the flagged use."
    - "On EACH path, is the variable assigned a value BEFORE use?"
    - "Are there any EARLY RETURNS or GOTO statements that skip initialization?"
    - "If the variable is a struct, are ALL fields initialized before use?"
  context_hint: "Include all control flow paths from declaration to use."
  additional_context: []

cpp/integer-overflow:
  short_description: "Integer overflow in arithmetic operation"
  questions:
    - "What are the TYPES of the operands (int, size_t, unsigned, etc.)?"
    - "What are the MAXIMUM possible values of each operand?"
    - "Where do the operand VALUES come from - user input, file, network, constants?"
    - "Is there a CHECK for overflow BEFORE the arithmetic operation?"
    - "Is the RESULT used in a security-sensitive context (buffer allocation, array index, loop bound)?"
    - "Would the overflow cause wrapping (unsigned) or undefined behavior (signed)?"
  context_hint: "Include operand declarations and how their values are derived."
  additional_context: ["caller"]

cpp/weak-cryptographic-algorithm:
  short_description: "Use of weak or broken cryptographic algorithm"
  questions:
    - "What ALGORITHM is being used (MD5, SHA1, DES, RC4, etc.)?"
    - "What is the PURPOSE of the cryptographic operation (password hashing, signatures, encryption)?"
    - "Is this for SECURITY purposes or just checksums/identifiers?"
    - "Is there a STRONGER algorithm that could be used instead?"
    - "Is this code in a security-critical path or test/legacy code?"
    - "Are there any CONSTRAINTS (compatibility, performance) that require the weak algorithm?"
  context_hint: "Include the crypto function call and its context."
  additional_context: []

# ==============================================================================
# C/C++ Injection Vulnerabilities
# ==============================================================================

cpp/sql-injection:
  short_description: "User input concatenated into SQL query"
  questions:
    - "Where does the INPUT value originate - what is the ultimate SOURCE (argv, getenv, read, recv)?"
    - "Trace the INPUT through ALL assignments - does it ever get SANITIZED or ESCAPED?"
    - "Is the query built using STRING CONCATENATION or a PARAMETERIZED query?"
    - "If concatenated, could SQL metacharacters (quotes, semicolons, comments) alter the query?"
    - "Is there a PREPARED STATEMENT or PARAMETERIZED query that could be used instead?"
    - "What DATABASE API is used and does it support safe parameterization?"
  context_hint: "Trace from input source through all transformations to SQL execution."
  additional_context: ["caller"]

cpp/command-line-injection:
  short_description: "User input passed to shell command execution"
  questions:
    - "Where does the INPUT value originate - what is the ultimate SOURCE?"
    - "Is system() or popen() used (shell interpretation) or execv/execl (no shell)?"
    - "Trace the INPUT - is it ESCAPED for shell metacharacters (;|&$`\\)?"
    - "Could an attacker inject SHELL METACHARACTERS to execute additional commands?"
    - "Is the input VALIDATED against an allowlist of safe values?"
    - "Could execv/execl with separate arguments be used instead of system()?"
  context_hint: "Trace from input source to command execution function."
  additional_context: ["caller"]

cpp/path-injection:
  short_description: "User input used in file path allowing traversal"
  questions:
    - "Where does the PATH input originate - what is the ultimate SOURCE?"
    - "Is the path VALIDATED to reject directory traversal sequences (../)?"
    - "Is the path CANONICALIZED (realpath) before use?"
    - "After canonicalization, is the result CHECKED to be within allowed directories?"
    - "Could an attacker use '../' or symbolic links to access files outside the intended directory?"
    - "What FILE OPERATIONS are performed with this path (read, write, execute)?"
  context_hint: "Trace from input source through path construction to file operation."
  additional_context: ["caller"]

cpp/format-string-injection:
  short_description: "User input used directly as printf format string"
  questions:
    - "Where does the FORMAT STRING come from - is it user-controlled?"
    - "Is the user input passed as the FIRST argument to printf/sprintf/fprintf?"
    - "Or is it safely passed as a LATER argument with a fixed format string?"
    - "Could %n, %x, %s specifiers in the input read/write memory?"
    - "Is the input VALIDATED to contain only safe characters?"
    - "Should this use puts() or printf(\"%s\", input) instead?"
  context_hint: "Include the printf-family call with all arguments."
  additional_context: []

# ==============================================================================
# C/C++ - Scanf and Return Value Checks
# ==============================================================================

cpp/missing-return-value-check:
  short_description: "Return value of scanf-like function not checked"
  questions:
    - "What FUNCTION is called and what does its return value indicate?"
    - "Is the return value STORED in a variable or DISCARDED?"
    - "If stored, is it CHECKED before using the output values?"
    - "What happens if the function FAILS - are output variables left uninitialized?"
    - "Is the return value checked ELSEWHERE (in caller, via wrapper)?"
    - "What is the SECURITY IMPACT if failure is not detected?"
  context_hint: "Include the function call and subsequent use of output values."
  additional_context: ["caller"]

cpp/incorrect-return-value-check:
  short_description: "Incorrect comparison of scanf return value"
  questions:
    - "What VALUE is the return being compared against?"
    - "What does the function ACTUALLY return on success vs failure?"
    - "Is the comparison checking for the CORRECT success/failure condition?"
    - "Could a PARTIAL success (fewer items read) be incorrectly treated as full success?"
    - "What happens to output variables if fewer items are read than expected?"
    - "Is there a MISMATCH between expected and actual return value semantics?"
  context_hint: "Include the function call, return value check, and subsequent use."
  additional_context: []

# ==============================================================================
# Python Security
# ==============================================================================

py/sql-injection:
  short_description: "User input concatenated into SQL query"
  questions:
    - "Where does the INPUT originate - request.args, request.form, request.json, or other?"
    - "Trace the INPUT through ALL assignments - is it ever SANITIZED?"
    - "Is the query built using f-strings, .format(), +, or % (all vulnerable)?"
    - "Or is cursor.execute() called with PLACEHOLDERS and a tuple (safe)?"
    - "Is an ORM method like .filter() or .get() used instead of raw SQL?"
    - "What is the DATABASE and does the driver support parameterization?"
  context_hint: "Trace from request input through all transformations to query execution."
  additional_context: ["caller"]

py/command-injection:
  short_description: "User input passed to shell command execution"
  questions:
    - "Where does the INPUT originate - request, file, environment variable?"
    - "Is subprocess called with shell=True (vulnerable) or shell=False (safer)?"
    - "If shell=True, is shlex.quote() used to ESCAPE the input?"
    - "If shell=False, is the input passed as a LIST of arguments (safe)?"
    - "Could an attacker inject SHELL METACHARACTERS?"
    - "Is os.system() used (always vulnerable) vs subprocess.run()?"
  context_hint: "Trace from input source to subprocess/os.system call."
  additional_context: ["caller"]

py/xss:
  short_description: "User input rendered in HTML response without escaping"
  questions:
    - "Where does the INPUT originate - request.args, request.form, database?"
    - "Is the input passed through an ESCAPE function (escape(), html.escape())?"
    - "Is a TEMPLATE ENGINE used with auto-escaping enabled?"
    - "Or is the response built with f-strings/concatenation (vulnerable)?"
    - "Is |safe or {% autoescape false %} used to DISABLE escaping?"
    - "What is the CONTENT-TYPE of the response (text/html triggers XSS)?"
  context_hint: "Trace from input source through template/response construction."
  additional_context: ["caller"]

py/unsafe-deserialization:
  short_description: "Deserializing untrusted data with pickle or yaml.load"
  questions:
    - "Where does the SERIALIZED DATA come from - request body, file, database?"
    - "Is pickle.loads() or yaml.load() used (vulnerable to code execution)?"
    - "Could an attacker CONTROL the serialized data content?"
    - "Would json.loads() or yaml.safe_load() work as a SAFE alternative?"
    - "Is there any VALIDATION of the data before deserialization?"
    - "What CLASS or TYPE is expected to be deserialized?"
  context_hint: "Trace from data source to deserialization call."
  additional_context: ["caller"]

py/path-injection:
  short_description: "User input used in file path allowing directory traversal"
  questions:
    - "Where does the PATH input originate - request parameter, form field?"
    - "Is os.path.join() used (note: it does NOT prevent traversal if input starts with /)?"
    - "Is the path NORMALIZED with os.path.realpath() or os.path.abspath()?"
    - "After normalization, is the result CHECKED to start with the allowed base directory?"
    - "Could '../' sequences or absolute paths escape the intended directory?"
    - "What FILE OPERATIONS are performed (read, write, delete)?"
  context_hint: "Trace from input through path construction to file operation."
  additional_context: ["caller"]

py/code-injection:
  short_description: "User input passed to eval/exec/compile"
  questions:
    - "Where does the INPUT come from - request, file, environment?"
    - "Is eval(), exec(), or compile() called with user-controlled data?"
    - "Is there ANY validation or sandboxing of the input?"
    - "Could ast.literal_eval() be used instead (safe for data literals)?"
    - "What CODE could an attacker execute - import os, __import__, etc.?"
    - "Is the eval in a restricted namespace or with full globals?"
  context_hint: "Trace from input source to eval/exec call."
  additional_context: ["caller"]

py/ssrf:
  short_description: "Server-side request forgery via user-controlled URL"
  questions:
    - "Where does the URL come from - request parameter, database, config?"
    - "Is the URL VALIDATED against an allowlist of domains/hosts?"
    - "Could an attacker specify an INTERNAL IP (127.0.0.1, 169.254.x.x, 10.x.x.x)?"
    - "Is the URL SCHEME validated (http/https only, not file://)?"
    - "What RESPONSE data is returned to the user or used server-side?"
    - "Could an attacker probe internal services or exfiltrate data?"
  context_hint: "Trace from URL input through request construction."
  additional_context: ["caller"]

# ==============================================================================
# JavaScript/TypeScript Security
# ==============================================================================

js/sql-injection:
  short_description: "User input concatenated into SQL query"
  questions:
    - "Where does the INPUT originate - req.query, req.body, req.params?"
    - "Is the query built with STRING CONCATENATION or template literals?"
    - "Or are PARAMETERIZED queries used with ? or $1 placeholders?"
    - "If using an ORM, is raw() or literal() used to bypass safety?"
    - "Trace the INPUT - is it ever SANITIZED before use?"
    - "What DATABASE library is used (mysql, pg, sequelize)?"
  context_hint: "Trace from request input through query construction."
  additional_context: ["caller"]

js/xss:
  short_description: "User input rendered as HTML without escaping"
  questions:
    - "Where does the INPUT originate - req.query, req.body, URL, database?"
    - "Is innerHTML, outerHTML, or document.write() used with user input?"
    - "Is the input HTML-ESCAPED before insertion?"
    - "If using React, is dangerouslySetInnerHTML used (vulnerable)?"
    - "If using a template engine, is auto-escaping DISABLED?"
    - "Is textContent used instead of innerHTML (safe)?"
  context_hint: "Trace from input through DOM/response construction."
  additional_context: ["caller"]

js/prototype-pollution:
  short_description: "User-controlled property path can modify Object.prototype"
  questions:
    - "Is user input used as a PROPERTY KEY in bracket notation (obj[key])?"
    - "Could the key be '__proto__', 'constructor', or 'prototype'?"
    - "Is there a CHECK to filter these dangerous keys before assignment?"
    - "Is a recursive MERGE function used (_.merge, $.extend with deep=true)?"
    - "Does the merge function check hasOwnProperty before recursing?"
    - "Could Object.create(null) or Map be used instead of plain objects?"
  context_hint: "Include object merge/assignment logic with key sources."
  additional_context: ["caller"]

js/command-injection:
  short_description: "User input passed to shell command execution"
  questions:
    - "Where does the INPUT originate - request, file, environment?"
    - "Is child_process.exec() used (shell=true, vulnerable)?"
    - "Or is spawn/execFile used with shell:false (safer)?"
    - "Is the input passed as a SINGLE string (vulnerable) or argument ARRAY (safer)?"
    - "Are SHELL METACHARACTERS escaped or rejected?"
    - "Could an attacker inject ; | & $ ` to execute additional commands?"
  context_hint: "Trace from input source to child_process call."
  additional_context: ["caller"]

js/path-injection:
  short_description: "User input used in file path allowing directory traversal"
  questions:
    - "Where does the PATH input originate - request parameter?"
    - "Is path.join() used (note: it does NOT fully prevent traversal)?"
    - "Is path.resolve() or path.normalize() used?"
    - "After resolution, is the result CHECKED to start with the allowed base?"
    - "Could '../' sequences escape the intended directory?"
    - "What FILE OPERATIONS are performed (fs.readFile, fs.writeFile)?"
  context_hint: "Trace from input through path construction to fs operation."
  additional_context: ["caller"]

js/unsafe-deserialization:
  short_description: "Deserializing untrusted data with eval or unserialize"
  questions:
    - "Where does the SERIALIZED DATA come from - request body, cookie?"
    - "Is eval(), new Function(), or a vulnerable unserialize library used?"
    - "Could an attacker CRAFT the serialized data?"
    - "Would JSON.parse() work as a SAFE alternative?"
    - "Is there any VALIDATION of the data structure before use?"
    - "What CODE could an attacker execute if deserialization is unsafe?"
  context_hint: "Trace from data source to deserialization call."
  additional_context: ["caller"]

js/regex-dos:
  short_description: "Regular expression vulnerable to ReDoS via catastrophic backtracking"
  questions:
    - "What is the REGEX pattern - does it have nested quantifiers like (a+)+?"
    - "Is USER INPUT matched against this regex?"
    - "What is the MAXIMUM length of input that could be matched?"
    - "Is there a TIMEOUT on regex operations?"
    - "Could a crafted input like 'aaaaaaaaaaaaaaaaaaaaaaaa!' cause exponential backtracking?"
    - "Would a non-backtracking regex engine (RE2) be an option?"
  context_hint: "Include the regex pattern and where user input enters."
  additional_context: []

js/code-injection:
  short_description: "User input passed to eval or Function constructor"
  questions:
    - "Where does the INPUT come from - request, URL, postMessage?"
    - "Is eval(), new Function(), or setTimeout/setInterval with string used?"
    - "Is there ANY validation or sandboxing of the input?"
    - "Would JSON.parse() work for data parsing (safe)?"
    - "What CODE could an attacker inject and execute?"
    - "Is the eval in browser context (XSS) or server context (RCE)?"
  context_hint: "Trace from input source to eval/Function call."
  additional_context: ["caller"]

# ==============================================================================
# Authentication & Session Management
# ==============================================================================

py/broken-authentication:
  short_description: "Insecure session token generation or missing session expiry"
  questions:
    - "How are session tokens generated - what entropy source is used (secrets.token_hex, os.urandom, or weak random)?"
    - "Are session tokens INVALIDATED after logout or timeout - is there a server-side expiry enforced?"
    - "Is the session token sent over HTTPS only (Secure flag) and inaccessible to JavaScript (HttpOnly flag)?"
    - "Is the session ID rotated after privilege escalation (e.g., after login to prevent session fixation)?"
    - "Are there concurrent session limits, or can an attacker reuse a stolen token indefinitely?"
    - "Does the authentication path validate credentials before creating a session, or can sessions be created without auth?"
  context_hint: "Include token generation, session creation, and session validation logic."
  additional_context: ["caller"]

py/hardcoded-credentials:
  short_description: "Hardcoded password, API key, or secret in source code"
  questions:
    - "Is this string a real credential used in production, or a placeholder/example/test value?"
    - "Is this value committed to version control where it could be exposed to others?"
    - "Could this credential be rotated if compromised, or is it baked into the application?"
    - "Is there an environment variable or secrets manager (Vault, AWS Secrets Manager) already in use that should be used instead?"
    - "What system or service does this credential grant access to, and what is the blast radius if leaked?"
    - "Is this code path reachable from production, or is it only used in tests/development?"
  context_hint: "Include the credential usage and any configuration loading."
  additional_context: []

js/broken-authentication:
  short_description: "JWT without signature validation or missing session expiry"
  questions:
    - "Is the JWT signature VERIFIED before trusting its payload - is the algorithm fixed server-side?"
    - "Could an attacker set 'alg: none' to bypass signature verification?"
    - "Does the JWT have an 'exp' claim and is it enforced?"
    - "Is the JWT stored securely (HttpOnly cookie) or in localStorage/sessionStorage (XSS-accessible)?"
    - "Is there a token revocation mechanism (blacklist, short TTL) if a token is compromised?"
    - "Is the signing secret sufficiently long and random, or is it a weak default?"
  context_hint: "Include token creation, verification, and storage logic."
  additional_context: ["caller"]

js/hardcoded-credentials:
  short_description: "Hardcoded API key, token, or secret in JavaScript source"
  questions:
    - "Is this string a real credential used in production, or a placeholder/example/test value?"
    - "Is this client-side JavaScript, where the credential would be exposed to any user?"
    - "Is this value committed to version control where it could be exposed?"
    - "Could this credential be rotated if compromised without a redeployment?"
    - "Should this value be loaded from environment variables or a secrets service instead?"
    - "What API or service does this credential authorize access to?"
  context_hint: "Include all locations where the credential is used."
  additional_context: []

# ==============================================================================
# Secrets / Sensitive Data Exposure
# ==============================================================================

cpp/hardcoded-credentials:
  short_description: "Hardcoded password, key, or secret in C/C++ source"
  questions:
    - "Is this string a real credential used in production, or a placeholder/example/test value?"
    - "Is this value compiled into the binary where it can be extracted with strings(1)?"
    - "Could an attacker extract this credential from a distributed binary or firmware image?"
    - "Is there a configuration file or environment variable mechanism that should be used instead?"
    - "What system does this credential grant access to, and what is the blast radius if leaked?"
    - "Is this code path reachable in production builds, or is it guarded by #ifdef DEBUG?"
  context_hint: "Include the credential usage and any build-time guards."
  additional_context: ["global"]

py/sensitive-data-exposure:
  short_description: "Sensitive data logged, printed, or transmitted without protection"
  questions:
    - "What sensitive data is being exposed (password, token, PII, credit card, health data)?"
    - "Where does this data end up - log file, HTTP response, console, third-party service?"
    - "Who has access to that destination (all users, admins, log aggregation services)?"
    - "Is the data MASKED or REDACTED before being written (e.g., last 4 digits of card)?"
    - "Is there a legal or compliance obligation (GDPR, PCI-DSS, HIPAA) that prohibits this exposure?"
    - "Is this in an error handler that might expose internal details to the end user?"
  context_hint: "Include the data source and where it flows to."
  additional_context: ["caller"]

js/sensitive-data-exposure:
  short_description: "Sensitive data stored in localStorage, logged, or leaked in responses"
  questions:
    - "What sensitive data is being exposed (token, PII, credentials, health data)?"
    - "Where does this data end up - localStorage, console.log, error response, analytics?"
    - "Is localStorage accessible to any JavaScript on the same origin (XSS risk)?"
    - "Is the data included in HTTP responses sent to the browser (could be cached or logged)?"
    - "Is there a legal or compliance obligation (GDPR, PCI-DSS) that prohibits this storage?"
    - "Should sessionStorage (cleared on tab close) or an HttpOnly cookie be used instead?"
  context_hint: "Include the data source and storage/transmission target."
  additional_context: ["caller"]

# ==============================================================================
# Cryptography Gaps
# ==============================================================================

cpp/insecure-randomness:
  short_description: "Using rand() or time() for security-sensitive random values"
  questions:
    - "What is this random value used for - session token, nonce, key, CSRF token, salt?"
    - "Is rand() or similar predictable PRNG used (seeded with time, pid, or constant)?"
    - "Could an attacker predict or brute-force the output space of this PRNG?"
    - "Is /dev/urandom, getrandom(), or a CSPRNG (libsodium, OpenSSL RAND_bytes) available?"
    - "What is the security impact if the random value is predictable (session hijacking, forgery)?"
    - "Is this used in cryptographic context (IV, key, salt) where weak randomness is catastrophic?"
  context_hint: "Include random generation call and how the value is used."
  additional_context: ["caller"]

py/insecure-randomness:
  short_description: "Using random module instead of secrets for security-sensitive values"
  questions:
    - "What is this random value used for - token, session ID, OTP, CSRF value, salt?"
    - "Is random.random(), random.randint(), or random.choice() used (not cryptographically secure)?"
    - "Could an attacker predict the output by observing previous values (Mersenne Twister is predictable)?"
    - "Should secrets.token_hex(), secrets.token_urlsafe(), or os.urandom() be used instead?"
    - "What is the security impact if the random value is predictable?"
    - "Is this in a test or simulation context where cryptographic strength is not needed?"
  context_hint: "Include random generation and how the value is used."
  additional_context: ["caller"]

js/insecure-randomness:
  short_description: "Using Math.random() for security-sensitive tokens or keys"
  questions:
    - "What is this random value used for - token, session ID, OTP, nonce, key?"
    - "Is Math.random() used (not cryptographically secure, predictable in some engines)?"
    - "Should crypto.getRandomValues() (browser) or crypto.randomBytes() (Node.js) be used?"
    - "Could an attacker predict the value by observing previous Math.random() outputs?"
    - "What is the security impact if the random value is predictable?"
    - "Is this in a non-security context (UI randomness, game logic) where Math.random() is acceptable?"
  context_hint: "Include random generation and how the value is used."
  additional_context: ["caller"]

py/ecb-encryption:
  short_description: "Using ECB cipher mode which reveals plaintext patterns"
  questions:
    - "What cipher mode is being used - is it explicitly ECB or is it the default (often ECB)?"
    - "What type of data is being encrypted (structured data, images, text blocks)?"
    - "Would ECB mode reveal patterns in the ciphertext (identical plaintext blocks produce identical ciphertext)?"
    - "Should GCM (authenticated encryption) or CBC with HMAC be used instead?"
    - "Is the encryption for confidentiality, integrity, or both?"
    - "Is there an IV/nonce being used - ECB mode does not use an IV which is a strong signal of weakness?"
  context_hint: "Include cipher initialization and mode selection."
  additional_context: []

js/weak-cryptographic-algorithm:
  short_description: "MD5 or SHA-1 used for password hashing or security-critical purpose"
  questions:
    - "What algorithm is being used (MD5, SHA-1) and for what purpose (password hashing, HMAC, checksum)?"
    - "Is this used for PASSWORD HASHING (must use bcrypt, argon2, scrypt) or data integrity?"
    - "Is there a salting step, or is the hash computed directly from the input?"
    - "MD5/SHA-1 are broken for collision resistance - could an attacker forge a valid hash?"
    - "Is this for backward compatibility, and is there a migration path to a stronger algorithm?"
    - "Is this in a non-security context (cache keys, content addressing) where MD5 is acceptable?"
  context_hint: "Include the hash computation and how the result is used."
  additional_context: []

# ==============================================================================
# Concurrency / Race Conditions
# ==============================================================================

cpp/race-condition:
  short_description: "TOCTOU or data race on shared state without synchronization"
  questions:
    - "Is there a TIME-OF-CHECK-TIME-OF-USE (TOCTOU) gap between checking and using a resource (file, variable)?"
    - "Is the shared resource (file, global variable, heap object) accessed from multiple threads?"
    - "Is a mutex, lock, or atomic operation used to protect the shared state?"
    - "On TOCTOU: could an attacker replace the file/resource between the check and the use (symlink attack)?"
    - "On data race: what is the impact of reading a partially-written value (corruption, security bypass)?"
    - "Can the check and use be merged into a single atomic operation (e.g., open with O_CREAT|O_EXCL)?"
  context_hint: "Include the check and use operations and any locking around them."
  additional_context: ["caller", "global"]

cpp/thread-safety-violation:
  short_description: "Unsynchronized access to shared data across threads"
  questions:
    - "Is this variable or data structure accessed from multiple threads concurrently?"
    - "Is there a mutex, spinlock, or atomic type protecting this access?"
    - "What is the worst-case impact of a data race (heap corruption, use-after-free, security bypass)?"
    - "Are ALL read AND write accesses to the shared data protected, not just some?"
    - "Could using std::atomic or _Atomic (C11) replace the need for a mutex here?"
    - "Is the thread access pattern clearly documented, or is synchronization responsibility unclear?"
  context_hint: "Include variable declarations and all accesses across thread boundaries."
  additional_context: ["global", "caller"]

py/race-condition:
  short_description: "TOCTOU race on filesystem or shared state without proper locking"
  questions:
    - "Is os.path.exists() or os.access() checked before opening/using a file (TOCTOU gap)?"
    - "Could an attacker replace the file with a symlink between the check and the open?"
    - "Is threading.Lock() or a file lock (fcntl.flock) used to protect shared state?"
    - "Can the operation be made atomic - e.g., open with 'x' mode (exclusive creation) instead of checking?"
    - "In a multi-threaded or multi-process context, is the shared variable protected?"
    - "What is the security impact if the race is won by an attacker (arbitrary file write, privilege escalation)?"
  context_hint: "Include the check and use operations and any locking."
  additional_context: ["caller"]

# ==============================================================================
# Resource Leaks
# ==============================================================================

cpp/resource-leak:
  short_description: "File handle, socket, or other resource not closed on all code paths"
  questions:
    - "Where is the resource OPENED or ALLOCATED (fopen, socket, malloc, CreateHandle)?"
    - "Is there a corresponding CLOSE or FREE on ALL code paths, including error paths?"
    - "Are there early returns or exception-like paths (goto, longjmp) that skip cleanup?"
    - "Is RAII (std::unique_ptr, std::fstream) or a cleanup label used to ensure release?"
    - "What is the impact of leaking this resource - file descriptor exhaustion, memory exhaustion, lock held?"
    - "Is this in a long-running process where the leak accumulates, or a short-lived process?"
  context_hint: "Include resource acquisition, all return paths, and any cleanup code."
  additional_context: ["caller"]

cpp/memory-leak:
  short_description: "Heap memory allocated but not freed on all code paths"
  questions:
    - "Where is memory ALLOCATED (malloc, calloc, new, strdup) and assigned to what variable?"
    - "Is there a corresponding free()/delete on ALL code paths (success and error)?"
    - "Are there early returns, breaks, or goto statements that skip the free()?"
    - "Is there an ALIAS of the pointer that outlives the original - could double-free result from fixing this?"
    - "Is this in a loop where each iteration allocates but the free is outside the loop?"
    - "Would using RAII (std::unique_ptr, std::vector) eliminate the need for manual free?"
  context_hint: "Include allocation site, all code paths, and any deallocation."
  additional_context: ["caller"]

# ==============================================================================
# XXE — XML External Entity Injection
# ==============================================================================

py/xxe:
  short_description: "XML parser configured to allow external entity resolution"
  questions:
    - "Which XML library is used (lxml, xml.etree, minidom, xmltodict, defusedxml)?"
    - "Is the XML input from an untrusted source (request body, uploaded file, network)?"
    - "Are external entities explicitly DISABLED (e.g., lxml with resolve_entities=False, no_network=True)?"
    - "Is defusedxml used as a safe drop-in replacement?"
    - "Could an attacker use an XXE payload to read local files (/etc/passwd) or perform SSRF?"
    - "Is DTD processing disabled, or could an attacker define a DOCTYPE with external entities?"
  context_hint: "Include XML parser initialization and all parsing options."
  additional_context: ["caller"]

js/xxe:
  short_description: "Node.js XML parser allowing external entity resolution"
  questions:
    - "Which XML parser is used (xml2js, fast-xml-parser, DOMParser, libxmljs)?"
    - "Is the XML input from an untrusted source (request body, uploaded file, API response)?"
    - "Is external entity processing explicitly DISABLED in the parser options?"
    - "Could an attacker use a DOCTYPE declaration to define entities that read local files?"
    - "Could XXE be leveraged for SSRF by making the parser fetch an external URL?"
    - "Would switching to a safer parser or JSON format eliminate the risk entirely?"
  context_hint: "Include XML parser initialization, options, and input source."
  additional_context: ["caller"]

# ==============================================================================
# Type Safety / Undefined Behavior
# ==============================================================================

cpp/type-confusion:
  short_description: "Unsafe type cast or union access leading to type confusion"
  questions:
    - "What types are involved in the cast - source type and destination type?"
    - "Is this a reinterpret_cast, C-style cast, or union member access of a different type than written?"
    - "Does the destination type have a different size, alignment, or representation than the source?"
    - "Is this pattern defined behavior in the C/C++ standard, or is it UB (strict aliasing violation)?"
    - "Could an attacker control the value being cast to cause unintended behavior?"
    - "Would using memcpy to copy bytes (safe for aliasing) or a union with proper semantics fix this?"
  context_hint: "Include the cast expression and the types involved."
  additional_context: ["struct"]

cpp/signed-overflow:
  short_description: "Signed integer overflow which is undefined behavior in C/C++"
  questions:
    - "What are the TYPES of the operands (int, long, int32_t) and operation (+, -, *, <<)?"
    - "What is the MAXIMUM value each operand can hold, and does the result exceed INT_MAX/LONG_MAX?"
    - "Is this overflow intentional (e.g., wrapping arithmetic) or accidental?"
    - "Does the result get used for memory allocation, array indexing, or other security-sensitive operations?"
    - "Is there a CHECK for overflow BEFORE the operation (e.g., comparing operands to INT_MAX - b)?"
    - "Would using unsigned arithmetic, __builtin_add_overflow, or a larger type fix this?"
  context_hint: "Include operand declarations and how the result is used."
  additional_context: ["caller"]

# ==============================================================================
# Improper Error Handling / Information Disclosure
# ==============================================================================

cpp/information-exposure:
  short_description: "Error message or log reveals sensitive internal details"
  questions:
    - "What sensitive information is included in the error output (memory addresses, file paths, credentials, internal state)?"
    - "Where does this output go - returned to caller, written to log, sent over network, printed to stderr?"
    - "Is the recipient of this output an untrusted external user or an internal administrator?"
    - "Could a memory address in an error message help an attacker defeat ASLR?"
    - "Should the output be split into a user-facing generic message and an internal detailed log?"
    - "Is this in a debug/test build that would not be shipped to production?"
  context_hint: "Include error generation and where the output is sent."
  additional_context: ["caller"]

py/information-exposure:
  short_description: "Stack trace, exception detail, or internal path returned to user"
  questions:
    - "What sensitive information could be exposed - stack trace, file paths, database schema, internal variable values?"
    - "Is this returned in an HTTP response, rendered in a template, or logged to an accessible location?"
    - "In production, is DEBUG mode disabled and generic error pages served instead of tracebacks?"
    - "Could an attacker trigger this deliberately to learn about the application internals?"
    - "Is the exception handler catching too broadly and re-exposing the original exception message?"
    - "Should only a generic error message be returned to the user, with full details logged internally?"
  context_hint: "Include the exception handler and where the error detail is sent."
  additional_context: ["caller"]

js/information-exposure:
  short_description: "Stack trace, server path, or internal error detail in HTTP response"
  questions:
    - "What sensitive information is exposed - stack trace, file paths, library versions, database errors?"
    - "Is this returned in an HTTP response body or headers visible to the client?"
    - "Is NODE_ENV set to 'production', which typically disables detailed error output in frameworks?"
    - "Could an attacker trigger this path deliberately to enumerate internal structure?"
    - "Is the error middleware sending err.stack or err.message directly to res.send()?"
    - "Should only a generic error code be returned to the client, with full details written to a server log?"
  context_hint: "Include the error handler and how the error is sent to the client."
  additional_context: ["caller"]

# ==============================================================================
# Deprecated / Unsafe API Usage
# ==============================================================================

cpp/unsafe-functions:
  short_description: "Use of unsafe C functions like gets(), strcpy(), sprintf() without bounds"
  questions:
    - "Which unsafe function is used (gets, strcpy, strcat, sprintf, scanf with %s)?"
    - "What is the SIZE of the destination buffer and can the input exceed it?"
    - "Is the input from an untrusted source (user input, network, file)?"
    - "What is the safe replacement (fgets, strncpy/strlcpy, snprintf, strncat/strlcat)?"
    - "If using strncpy, is the destination null-terminated - strncpy does NOT guarantee null termination?"
    - "Is there a code review or compiler warning (e.g., -Wformat, -D_FORTIFY_SOURCE) that should catch this?"
  context_hint: "Include destination buffer declaration and input source."
  additional_context: ["caller"]

py/deprecated-api:
  short_description: "Weak hash function (MD5/SHA1) used for passwords or security-critical purpose"
  questions:
    - "What is hashlib.md5() or hashlib.sha1() used for - password storage, HMAC, content addressing, checksum?"
    - "If for PASSWORD HASHING: bcrypt, argon2, or scrypt must be used instead (MD5/SHA1 are not password hash functions)?"
    - "Is there a salt used, or is the hash computed directly from the input (rainbow table vulnerable)?"
    - "For non-password use: is collision resistance required (MD5/SHA1 are broken for collisions)?"
    - "Is this for backward compatibility with an external system that requires MD5/SHA1?"
    - "Is this code path reachable in production, or only used in tests/development?"
  context_hint: "Include hash computation and how the result is used."
  additional_context: []

# ==============================================================================
# PHP Security
# ==============================================================================

php/sql-injection:
  short_description: "User input concatenated into SQL query in PHP"
  questions:
    - "Where does the INPUT originate - $_GET, $_POST, $_REQUEST, $_COOKIE, $_SERVER?"
    - "Is the query built with string concatenation or sprintf (vulnerable)?"
    - "Or is a PREPARED STATEMENT used with PDO::prepare() + bindParam() or MySQLi bind_param() (safe)?"
    - "Trace the INPUT - is it passed through mysql_real_escape_string() or similar (insufficient for safety)?"
    - "Could SQL metacharacters (quotes, semicolons, comments) in the input alter the query structure?"
    - "What database API is used (PDO, MySQLi, legacy mysql_*) and does it support parameterization?"
  context_hint: "Trace from $_GET/$_POST through all assignments to query execution."
  additional_context: ["caller"]

php/command-injection:
  short_description: "User input passed to exec(), shell_exec(), system(), or backticks in PHP"
  questions:
    - "Where does the INPUT originate - $_GET, $_POST, $_COOKIE, or other superglobal?"
    - "Is exec(), shell_exec(), system(), passthru(), popen(), or backtick syntax used?"
    - "Is escapeshellarg() or escapeshellcmd() applied to the input before use?"
    - "Is an allowlist used to validate the input against known-safe values?"
    - "Could an attacker inject shell metacharacters (;|&$`\\) to execute additional commands?"
    - "Could the functionality be achieved without shell invocation (PHP built-in functions)?"
  context_hint: "Trace from input superglobal to shell execution function."
  additional_context: ["caller"]

php/xss:
  short_description: "User input echoed to HTML output without escaping in PHP"
  questions:
    - "Where does the INPUT originate - $_GET, $_POST, $_COOKIE, database, or other source?"
    - "Is echo, print, or heredoc used to output user input directly?"
    - "Is htmlspecialchars() or htmlentities() applied with ENT_QUOTES before output?"
    - "Is a templating engine (Twig, Blade) with auto-escaping enabled used?"
    - "Could an attacker inject <script> tags or event handlers to execute JavaScript?"
    - "Is the output in an HTML attribute context, requiring attribute-specific escaping?"
  context_hint: "Trace from input through all assignments to HTML output."
  additional_context: ["caller"]

php/path-injection:
  short_description: "User input used in include(), require(), or file operations allowing traversal"
  questions:
    - "Where does the PATH input originate - $_GET, $_POST, or other user-controlled source?"
    - "Is include(), require(), include_once(), file_get_contents(), or fopen() used with user input?"
    - "Is the path VALIDATED against an allowlist of permitted file names or paths?"
    - "Is realpath() used and the result CHECKED to be within the intended base directory?"
    - "Could '../' sequences allow reading arbitrary files or including remote URLs (allow_url_include)?"
    - "Is allow_url_include disabled in php.ini, preventing remote file inclusion?"
  context_hint: "Trace from input through path construction to file/include operation."
  additional_context: ["caller"]

php/code-injection:
  short_description: "User input passed to eval() or preg_replace() with /e modifier in PHP"
  questions:
    - "Where does the INPUT come from - $_GET, $_POST, database, or config file?"
    - "Is eval(), assert() with a string argument, or preg_replace() with /e modifier used?"
    - "Is there ANY validation or allowlist applied before eval()?"
    - "What PHP code could an attacker inject - system(), file_get_contents(), or data exfiltration?"
    - "Could the functionality be achieved without eval (e.g., using a lookup table or switch)?"
    - "Is this in a template engine or plugin system that should use a sandboxed evaluator?"
  context_hint: "Trace from input to eval() or equivalent dynamic code execution."
  additional_context: ["caller"]

php/xxe:
  short_description: "PHP XML parser allowing external entity resolution on untrusted input"
  questions:
    - "Which PHP XML API is used (SimpleXML, DOMDocument, XMLReader, xml_parse)?"
    - "Is the XML input from an untrusted source (request body, uploaded file, API)?"
    - "Is libxml_disable_entity_loader(true) called before parsing (PHP < 8.0)?"
    - "In PHP 8.0+, are LIBXML_NOENT flags avoided (entity loading is disabled by default)?"
    - "Could an attacker use a DOCTYPE + ENTITY to read local files or trigger SSRF?"
    - "Is DTD processing disabled - could an attacker send a DOCTYPE declaration?"
  context_hint: "Include XML parser initialization, options, and input source."
  additional_context: ["caller"]

php/broken-authentication:
  short_description: "Weak session management or missing session_regenerate_id() in PHP"
  questions:
    - "Is session_regenerate_id(true) called after successful login to prevent session fixation?"
    - "Is the session ID generated by PHP's session_start() (uses CSPRNG) or custom-generated?"
    - "Are session cookies set with Secure, HttpOnly, and SameSite attributes?"
    - "Is there a session timeout enforced server-side (not just via cookie expiry)?"
    - "Is the session_save_path secure, or could other users on shared hosting read session files?"
    - "Are session tokens validated server-side, or is user-provided data (cookie, GET param) trusted directly?"
  context_hint: "Include session initialization, cookie settings, and authentication logic."
  additional_context: ["caller"]

php/hardcoded-credentials:
  short_description: "Hardcoded password, API key, or database credentials in PHP source"
  questions:
    - "Is this string a real credential used in production, or a placeholder/example value?"
    - "Is this value committed to version control where it could be exposed?"
    - "Could an attacker read this credential if they gain access to the PHP source (e.g., via LFI, backup files)?"
    - "Should this be loaded from a .env file (with phpdotenv), environment variable, or secrets vault?"
    - "What service or database does this credential grant access to?"
    - "Is this in included configuration that may be web-accessible (e.g., config.php in webroot)?"
  context_hint: "Include the credential usage and any configuration loading."
  additional_context: []

php/unsafe-deserialization:
  short_description: "unserialize() called on user-controlled data enabling object injection"
  questions:
    - "Where does the SERIALIZED DATA come from - $_GET, $_POST, $_COOKIE, database, or file?"
    - "Is unserialize() called on user-controlled data without any HMAC validation?"
    - "Are there classes in the codebase with __wakeup(), __destruct(), or __toString() magic methods that could be abused?"
    - "Could an attacker craft a POP chain using existing classes to achieve RCE or file write?"
    - "Would json_decode() work as a safer alternative for the data being transmitted?"
    - "Is there a whitelist of allowed classes passed as the second argument to unserialize()?"
  context_hint: "Trace from data source to unserialize() and identify classes with magic methods."
  additional_context: ["caller"]

# ==============================================================================
# Generic/Fallback - For Unknown Rules
# ==============================================================================

default:
  short_description: "Generic CodeQL security finding"
  questions:
    - "Where does the potentially DANGEROUS data originate - what is the ultimate SOURCE?"
    - "Trace the data through ALL assignments - list each variable it flows through."
    - "At each step, is there any VALIDATION, SANITIZATION, or ENCODING applied?"
    - "What is the SINK - where does the data end up being used unsafely?"
    - "What is the SECURITY IMPACT if an attacker controls this data?"
    - "Are there any MITIGATING FACTORS in the broader context (dead code, test code, internal use only)?"
  context_hint: "Must trace the complete data flow from source to sink."
  additional_context: ["caller", "struct", "global"]
