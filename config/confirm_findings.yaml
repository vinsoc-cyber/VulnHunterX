# =============================================================================
# CodeQL + LLM Verification Configuration
# =============================================================================
#
# This file contains APPLICATION SETTINGS for LLM verification.
# Secrets and environment-specific settings go in .env file.
#
# Configuration Priority (highest to lowest):
#   1. Command-line arguments (--provider, --model, etc.)
#   2. Environment variables (OLLAMA_API_BASE, CODEQL_PATH)
#   3. This config file
#   4. Built-in defaults
#
# =============================================================================

# =============================================================================
# LLM Provider Settings
# =============================================================================

# LLM provider: "openai" or "ollama"
provider: openai

# LLM model name
# For OpenAI: gpt-4o, gpt-4-turbo, gpt-3.5-turbo
# For Ollama: ollama/llama3.2, ollama/codellama, ollama/mistral
model: gpt-4o

# Note: Ollama server URL is set via OLLAMA_API_BASE environment variable
# in .env file (default: http://localhost:11434)

# =============================================================================
# Analysis Mode Settings
# =============================================================================

# Confirmation mode: "simple" or "vulnhalla"
# - simple: Single-shot LLM call with basic prompts
# - vulnhalla: Multi-turn with enhanced data-flow prompts
mode: vulnhalla

# Maximum LLM conversation rounds for context expansion (vulnhalla mode only)
# Set to 1 to disable multi-turn
max_iterations: 3

# LLM temperature (0.0 = deterministic, 1.0 = creative)
temperature: 0.2

# Maximum tokens in LLM response
max_tokens: 1500

# =============================================================================
# Output Settings
# =============================================================================

# Verbosity level:
# - quiet: Minimal output (only verdicts and summary)
# - normal: Standard output (progress and results)
# - verbose: Full output (includes LLM prompts/responses)
verbosity: normal

# Save full LLM conversations to a log file (set to null to disable)
# Use markdown format (.md) for best readability
log_file: null

# =============================================================================
# Processing Limits
# =============================================================================

# Maximum number of findings to process (0 = unlimited)
limit: 0

# Only process findings from specific languages (empty = all)
# Options: c, cpp, python, javascript
languages: []

# Only process findings from specific repositories (empty = all)
repositories: []

# =============================================================================
# Paths (relative to repo root)
# =============================================================================

# Output directory for results
output_dir: output

# Repositories directory for context extraction
repos_dir: repos

# Context CSV directory (for multi-turn context expansion)
context_dir: config/context

# Guided questions file
questions_file: config/prompts/guided_questions.yaml
