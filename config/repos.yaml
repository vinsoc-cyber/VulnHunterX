# Phase 2: Repos to clone and CodeQL DBs to create.
# Format: list of { name, url, language, build_command?, sanitized_build_command?, sanitizer_flags? }
# name: used for dirs repos/<lang>/<name>/ and output/<lang>/<name>/
# build_command: required for c/cpp; omit for python/javascript.
# sanitized_build_command: optional; for fuzz Stage 5. If omitted, build_command is used with CC/CXX/CFLAGS/LDFLAGS set for sanitizers.
# sanitizer_flags: optional; e.g. { cflags: "-fsanitize=address,undefined -g", ldflags: "-fsanitize=address,undefined" }
# Demo subset (small/fast for testing) is listed first.

repos:
  # --- Demo subset (small, fast) ---
  - name: minimist
    url: https://github.com/minimistjs/minimist.git
    language: javascript
  - name: pyyaml
    url: https://github.com/yaml/pyyaml.git
    language: python
  - name: zlib
    url: https://github.com/madler/zlib.git
    language: c
    build_command: "./configure && make"
  - name: re2
    url: https://github.com/google/re2.git
    language: cpp
    build_command: "mkdir -p build && cd build && cmake .. && make"

  # --- C (OSS-Fuzz) ---
  - name: libjpeg-turbo
    url: https://github.com/libjpeg-turbo/libjpeg-turbo.git
    language: c
    build_command: "mkdir -p build && cd build && cmake .. && make"
  - name: libucl
    url: https://github.com/vstakhov/libucl.git
    language: c
    build_command: "mkdir -p build && cd build && cmake .. && make"
  - name: libconfig
    url: https://github.com/hyperrealm/libconfig.git
    language: c
    build_command: "autoreconf -i && ./configure && make"
  - name: c-ares
    url: https://github.com/c-ares/c-ares.git
    language: c
    build_command: "autoreconf -i && ./configure && make"
  - name: libssh
    url: https://github.com/libssh/libssh-mirror.git
    language: c
    build_command: "mkdir -p build && cd build && cmake .. && make"
  - name: json-c
    url: https://github.com/json-c/json-c.git
    language: c
    build_command: "mkdir -p build && cd build && cmake .. && make"
  - name: libsndfile
    url: https://github.com/libsndfile/libsndfile.git
    language: c
    build_command: "mkdir -p build && cd build && cmake .. && make"
  - name: expat
    url: https://github.com/libexpat/libexpat.git
    language: c
    build_command: "mkdir -p build && cd build && cmake .. && make"
  - name: libyaml
    url: https://github.com/yaml/libyaml.git
    language: c
    build_command: "mkdir -p build && cd build && cmake .. && make"
  - name: lz4
    url: https://github.com/lz4/lz4.git
    language: c
    build_command: "make"
  - name: xz
    url: https://github.com/tukaani-project/xz.git
    language: c
    build_command: "autoreconf -fi && ./configure && make"
  - name: libevent
    url: https://github.com/libevent/libevent.git
    language: c
    build_command: "mkdir -p build && cd build && cmake .. && make"
  - name: libusb
    url: https://github.com/libusb/libusb.git
    language: c
    build_command: "autoreconf -i && ./configure && make"
  - name: libssh2
    url: https://github.com/libssh2/libssh2.git
    language: c
    build_command: "mkdir -p build && cd build && cmake .. && make"
  - name: pcre2
    url: https://github.com/PCRE2Project/pcre2.git
    language: c
    build_command: "./configure && make"
  - name: flac
    url: https://github.com/xiph/flac.git
    language: c
    build_command: "mkdir -p build && cd build && cmake .. && make"

  # --- C++ (OSS-Fuzz) ---
  - name: nghttp2
    url: https://github.com/nghttp2/nghttp2.git
    language: cpp
    build_command: "autoreconf -i && ./configure && make"
  - name: libxml2
    url: https://github.com/GNOME/libxml2.git
    language: cpp
    build_command: "mkdir -p build && cd build && cmake .. && make"
  - name: libpng
    url: https://github.com/pnggroup/libpng.git
    language: cpp
    build_command: "mkdir -p build && cd build && cmake .. && make"
  - name: curl
    url: https://github.com/curl/curl.git
    language: cpp
    build_command: "autoreconf -fi && ./configure && make"
  - name: libarchive
    url: https://github.com/libarchive/libarchive.git
    language: cpp
    build_command: "mkdir -p build && cd build && cmake .. && make"
  - name: harfbuzz
    url: https://github.com/harfbuzz/harfbuzz.git
    language: cpp
    build_command: "meson setup build && ninja -C build"
  - name: tinyxml2
    url: https://github.com/leethomason/tinyxml2.git
    language: cpp
    build_command: "mkdir -p build && cd build && cmake .. && make"
  - name: freetype2
    url: https://github.com/freetype/freetype.git
    language: cpp
    build_command: "mkdir -p build && cd build && cmake .. && make"
  - name: lodash
    url: https://github.com/lodash/lodash.git
    language: javascript
  - name: requests
    url: https://github.com/psf/requests.git
    language: python

  # --- Intentionally Vulnerable Projects (for demo/testing) ---
  - name: insecure-coding-examples
    url: https://github.com/patricia-gallardo/insecure-coding-examples.git
    language: cpp
    build_command: "mkdir -p build && cd build && cmake .. && make || true"
  - name: insecure-cpp-dojo
    url: https://github.com/patricia-gallardo/insecure-cplusplus-dojo.git
    language: cpp
    build_command: "mkdir -p build && cd build && cmake .. && make || true"
  - name: nodegoat
    url: https://github.com/OWASP/NodeGoat.git
    language: javascript
  - name: dvpwa
    url: https://github.com/anxolerd/dvpwa.git
    language: python
  - name: dvcp
    url: https://github.com/hardik05/Damn_Vulnerable_C_Program.git
    language: c
    build_command: "gcc -g -o dvcp imgRead.c"
  - name: fuzzgoat
    url: https://github.com/fuzzstati0n/fuzzgoat.git
    language: cpp
    build_command: "make"
  - name: bad-python-extract
    url: https://github.com/ajinabraham/bad_python_extract.git
    language: python
