# XPath-injection (CWE-643) family policy — Python.
#
# A finding whose language is Python and whose rule is py/xpath-injection (CWE-643)
# is verified through the evidence-closure path: the model supplies each fact
# value with cited evidence, decisive facts must be resolved by admissible
# evidence, and this table — not the model's own verdict string — entails TP/FP/NMD.
#
# CWE-643 is specifically about attacker data gaining control over the query
# STRUCTURE, so query_position (expression syntax vs. bound data) is decisive
# alongside reach and neutralization. security_effect keeps a rule-match from
# being confirmed when the query result has no real consequence.
#
# Language-scoped to Python (selectors.languages) so it never captures the
# PHP / Go / Java / C# XPath rules that share CWE-643.

family: xpath_injection
version: "1"

selectors:
  languages: [python]
  cwes: ["CWE-643"]
  rule_aliases: ["py/xpath-injection"]

fact_slots:
  sink_binding: [QUALIFYING_XPATH_SINK, NOT_XPATH_SINK]
  attacker_control: [PROVEN, REFUTED]
  flow_to_sink: [REACHES, NO_PATH_COMPLETE]
  query_position: [EXPRESSION_PATH_FOUND, BOUND_DATA_ONLY_ALL_PATHS]
  neutralization_coverage: [BYPASS_PATH_FOUND, ALL_REACHING_PATHS]
  security_effect: [SECURITY_RELEVANT_EFFECT, NO_SECURITY_EFFECT]
  production_scope: [PROD, TEST_ONLY, EXAMPLE_DEV, GENERATED_VENDOR, UNKNOWN]

decisive_slots:
  - sink_binding
  - attacker_control
  - flow_to_sink
  - query_position
  - neutralization_coverage
  - security_effect

entailment:
  true_positive:
    sink_binding: QUALIFYING_XPATH_SINK
    attacker_control: PROVEN
    flow_to_sink: REACHES
    query_position: EXPRESSION_PATH_FOUND
    neutralization_coverage: BYPASS_PATH_FOUND
    security_effect: SECURITY_RELEVANT_EFFECT
  false_positive_if_any:
    - sink_binding: NOT_XPATH_SINK
    - attacker_control: REFUTED
    - flow_to_sink: NO_PATH_COMPLETE
    - query_position: BOUND_DATA_ONLY_ALL_PATHS
    - neutralization_coverage: ALL_REACHING_PATHS
    - security_effect: NO_SECURITY_EFFECT

# Evidence-shape profile required to admit each (slot, value) — see
# verification/policy/support.py PROFILE_NAMES. Note there is no
# NONE_FOUND_COMPLETE value: no evidence kind can exhaustively establish "no
# XPath defense anywhere", so a witnessed unsafe-expression path is required for
# TP, otherwise the finding stays Needs-More-Data.
admissibility:
  sink_binding:
    QUALIFYING_XPATH_SINK: LOCAL_POSITIVE
    NOT_XPATH_SINK: LOCAL_POSITIVE
  attacker_control:
    PROVEN: LOCAL_OR_DATAFLOW
    REFUTED: LOCAL_POSITIVE
  flow_to_sink:
    REACHES: LOCAL_OR_DATAFLOW
    NO_PATH_COMPLETE: LOCAL_OR_COMPLETE_ABSENCE
  query_position:
    EXPRESSION_PATH_FOUND: CONCRETE_PATH
    BOUND_DATA_ONLY_ALL_PATHS: LOCAL_OR_EXHAUSTIVE
  neutralization_coverage:
    BYPASS_PATH_FOUND: CONCRETE_PATH
    ALL_REACHING_PATHS: LOCAL_OR_EXHAUSTIVE
  security_effect:
    SECURITY_RELEVANT_EFFECT: LOCAL_POSITIVE
    NO_SECURITY_EFFECT: LOCAL_POSITIVE
  production_scope:
    PROD: ANY_CITATION
    TEST_ONLY: ANY_CITATION
    EXAMPLE_DEV: ANY_CITATION
    GENERATED_VENDOR: ANY_CITATION
    UNKNOWN: ANY_CITATION

# Neutral fact-gathering guidance (no verdict commands, no benchmark names).
assessment_guidance:
  - "Quote the exact XPath sink call (e.g. Element.xpath(...), etree.XPath(...), find/findall) and name the XPath-string value passed to it."
  - "List every assignment to that value on each path that reaches the sink, with line numbers; identify the last assignment on each path."
  - "query_position: does attacker input become part of the XPath EXPRESSION text (string concatenation/format into the query), or is it passed only as a bound DATA value (parameterized variable) on every reaching path?"
  - "neutralization: name a concrete defense at the sink — lxml variable binding (node.xpath('//u[@n=$n]', n=user)) or an enforced full-string allowlist. A partial filter (e.g. escaping apostrophes only) does not cover other XPath metacharacters."
  - "security_effect: is the XPath result used in a security-relevant way (authorization decision, data selection, returned to the caller), or is it discarded / non-security-relevant?"
