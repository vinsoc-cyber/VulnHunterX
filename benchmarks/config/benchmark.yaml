# VulnHunterX Benchmark Configuration
#
# Override any setting via CLI flags to run_benchmark.py.
# This file provides project-level defaults.

# ── Dataset paths ──────────────────────────────────────────────────────────────
datasets:
  secllmholmes: benchmarks/datasets/secllmholmes
  juliet:       benchmarks/datasets/juliet

# ── LLM settings ──────────────────────────────────────────────────────────────
llm:
  provider: openai
  model: gpt-4.1          # default model; override with --model
  # Alternatives:
  #   model: gpt-5                # frontier ceiling (more expensive)
  #   model: deepseek-reasoner    # cost-effective frontier reasoning
  #   model: claude-sonnet-4-6    # Anthropic (set ANTHROPIC_API_KEY)
  #   model: ollama/qwen3-coder:480b-cloud  # bulk/scale (set OLLAMA_API_BASE/KEYS)

# ── Verification settings ─────────────────────────────────────────────────────
verification:
  max_iterations: 10      # multi-turn rounds for vulnhunterx / generic-questions
  # Iteration sweep: run vulnhunterx at each of these values to measure
  # the marginal accuracy gain per additional context round.
  # Enable via: python run_benchmark.py --iteration-sweep
  iteration_sweep: [1, 2, 3]

# ── Metrics settings ──────────────────────────────────────────────────────────
metrics:
  # How to handle "Needs More Data" verdicts in precision/recall:
  #   exclude  — NMD is counted separately as nmd_rate (default)
  #   fp       — NMD is treated as a False Positive prediction
  nmd_handling: exclude

# ── Run settings ──────────────────────────────────────────────────────────────
run:
  # Default entry limit per dataset (0 = no limit)
  limit: 0
  # Results output directory (relative to repo root)
  results_dir: benchmarks/results
